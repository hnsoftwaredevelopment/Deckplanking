name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version override in YY.MM.xxx format
        required: false
        type: string

jobs:
  build:
    name: Windows publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore MAUI workloads
        run: dotnet workload restore src\DeckPlanking.App\DeckPlanking.App.csproj

      - name: Write Syncfusion license
        shell: pwsh
        env:
          SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:SYNCFUSION_LICENSE)) {
            New-Item -ItemType Directory -Path docs -Force | Out-Null
            Set-Content -LiteralPath docs\SyncfusionLicense.txt -Value $env:SYNCFUSION_LICENSE -NoNewline
          }

      - name: Publish Windows
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "{0}.{1:000}" -f (Get-Date -Format 'yy.MM'), [int]"${{ github.run_number }}"
          }
          .\scripts\build-windows.ps1 -VersionOverride $version

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: deckplanking-windows
          path: artifacts/windows/**
          if-no-files-found: error
          retention-days: 14
