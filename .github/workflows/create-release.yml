name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version in YY.MM.xxx format
        required: false
        type: string
      draft:
        description: Create the GitHub release as draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        default: false
        type: boolean
      build_playstore:
        description: Build and attach a Play Store AAB when signing secrets are available
        required: true
        default: false
        type: boolean
      release_notes_file:
        description: Optional Markdown file to use as release notes
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore MAUI workloads
        run: dotnet workload restore src\DeckPlanking.App\DeckPlanking.App.csproj

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Write Syncfusion license
        shell: pwsh
        env:
          SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:SYNCFUSION_LICENSE)) {
            New-Item -ItemType Directory -Path docs -Force | Out-Null
            Set-Content -LiteralPath docs\SyncfusionLicense.txt -Value $env:SYNCFUSION_LICENSE -NoNewline
          }

      - name: Write Android upload keystore
        if: ${{ inputs.build_playstore }}
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_BASE64)) {
            New-Item -ItemType Directory -Path .secrets -Force | Out-Null
            [IO.File]::WriteAllBytes(".secrets\android-upload.keystore", [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))
          }

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "{0}.{1:000}" -f (Get-Date -Format 'yy.MM'), [int]"${{ github.run_number }}"
          }

          if ($version -notmatch '^\d{2}\.\d{2}\.\d{1,5}$') {
            throw "Version must use YY.MM.xxx, for example 26.07.001."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows installer
        shell: pwsh
        run: .\Installer\Build-Installer.ps1 -VersionOverride "${{ steps.version.outputs.version }}"

      - name: Build Android ARM64 APK
        shell: pwsh
        run: .\scripts\build-android-arm64.ps1 -VersionOverride "${{ steps.version.outputs.version }}"

      - name: Build Android universal APK
        shell: pwsh
        run: .\scripts\build-android-universal.ps1 -VersionOverride "${{ steps.version.outputs.version }}"

      - name: Build Play Store AAB
        if: ${{ inputs.build_playstore }}
        shell: pwsh
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $buildArguments = @{
            VersionOverride = "${{ steps.version.outputs.version }}"
          }

          $keystorePath = ".secrets\android-upload.keystore"
          if ((Test-Path -LiteralPath $keystorePath) -and
              -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_PASSWORD) -and
              -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_ALIAS) -and
              -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_PASSWORD)) {
            $buildArguments.KeystorePath = $keystorePath
            $buildArguments.KeystorePassword = $env:ANDROID_KEYSTORE_PASSWORD
            $buildArguments.KeyAlias = $env:ANDROID_KEY_ALIAS
            $buildArguments.KeyPassword = $env:ANDROID_KEY_PASSWORD
          }

          .\scripts\build-android-playstore.ps1 @buildArguments

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $notesFile = "${{ inputs.release_notes_file }}"
          $generatedNotes = Join-Path $env:RUNNER_TEMP "deckplanking-release-notes.md"

          if (-not [string]::IsNullOrWhiteSpace($notesFile) -and (Test-Path -LiteralPath $notesFile)) {
            $notesPath = (Resolve-Path -LiteralPath $notesFile).Path
          } else {
            @(
              "# Deckplanking $version",
              "",
              "Release created by GitHub Actions."
            ) | Set-Content -LiteralPath $generatedNotes -Encoding UTF8
            $notesPath = $generatedNotes
          }

          $assets = @(
            "artifacts/installer/DeckplankingSetup-$version.exe",
            "artifacts/android-arm64/Deckplanking-$version/nl.hnsoftwaredevelopment.deckplanking-Signed.apk",
            "artifacts/android-universal/Deckplanking-$version/Deckplanking-$version-universal.apk"
          )

          if ("${{ inputs.build_playstore }}" -eq "true") {
            $assets += @(Get-ChildItem -LiteralPath "artifacts/android-playstore/Deckplanking-$version" -Filter "*.aab" -File | Select-Object -ExpandProperty FullName)
          }

          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset)) {
              throw "Release asset was not found: $asset"
            }
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title "Deckplanking $version" --notes-file $notesPath
            if ($LASTEXITCODE -ne 0) {
              throw "Could not update existing release $tag."
            }

            $uploadArguments = @(
              'release', 'upload', $tag
            ) + $assets + @(
              '--clobber'
            )

            gh @uploadArguments
            if ($LASTEXITCODE -ne 0) {
              throw "Could not upload assets to existing release $tag."
            }
          } else {
            $arguments = @(
              'release', 'create', $tag
            ) + $assets + @(
              '--title', "Deckplanking $version",
              '--notes-file', $notesPath
            )

            if ("${{ inputs.draft }}" -eq "true") {
              $arguments += '--draft'
            }

            if ("${{ inputs.prerelease }}" -eq "true") {
              $arguments += '--prerelease'
            }

            gh @arguments
          }
